---
- name: Practice handlers
  hosts: okd_cluster
  become: yes
  gather_facts: yes

  tasks:
    - name: Create handler practice directory
      file:
        path: /tmp/handler_practice
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Create app config file
      copy:
        dest: /tmp/handler_practice/app.conf
        content: |
          Host: {{ inventory_hostname }}
          IP: {{ ansible_default_ipv4.address }}
          Role: {% if 'masters' in group_names %}MASTER{% else %}WORKER{% endif %}
        owner: root
        group: root
        mode: '0644'
      notify: Record config update

    - name: Create helper script
      copy:
        dest: /tmp/handler_practice/helper.sh
        content: |
          #!/bin/bash
          echo "hello from handler practice"
        owner: root
        group: root
        mode: '0755'

  handlers:
    - name: Record config update
      copy:
        dest: /tmp/handler_practice/config_update.log
        content: |
          Handler ran on {{ inventory_hostname }} because config changed
        owner: root
        group: root
        mode: '0644'